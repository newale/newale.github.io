<!DOCTYPE html>
<html lang="es-CL">
<head>
  {% include "head.html" %}
  <title>{{ title }}</title>
  <style>
    html, body { max-width: 45rem; }
  </style>
</head>
<body>
  {% include "./components/header.html" %}
  <main>
    <h1>{{ title }}</h1>
    <p class="entry-date">{{ date | formattedDate }} - {% if archivador %}Archivador: <a class="entry-archivador" href="/archivador/{{ archivador }}/">{{ archivador | capitalize }}</a>{% endif %}</p>
    {{ content }}
  </main>
  {% include "components/footer.html" %}
</body>
</html>
