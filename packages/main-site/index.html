---
layout: "layouts/home.html"
title: "Notas"
---

<ul class="garden-feed">
  {% for entry in collections.garden %}
  <li class="feed-item">
    <div class="feed-item-meta">
      <span class="feed-item-date">{{ entry.date | formattedDate }}</span> -
      {% if entry.data.archivador %}<a class="entry-archivador" href="/archivador/{{ entry.data.archivador }}/">{{ entry.data.archivador | capitalize }}</a>{% endif %}
    </div>
    <a class="feed-item-title" href="{{ entry.url }}">{{ entry.data.title }}</a>
    
  </li>
  {% endfor %}
</ul>
